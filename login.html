<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Inventario SM Canela</title>
</head>

<body>
    <div class="login-container">
        <img src="imagenes emp/LOGO EMPRESA.png" alt="logotipo" class="logo-login" width="180">
    <h1>Inventario Super Canela</h1>
    <p>Iniciar sesión</p>
    <form>
        <div class="input-group">
            <label for="usuario">Nombre de usuario</label>
            <input
               type="text"
               id="usuario"
               placeholder="Ingresa tu usuario"
               required
            >
        </div>

        <div class="input-group">
            <label for="password">Codigo</label>
            <input
               type="password"
               id="password"
               placeholder="Ingresa tu codigo"
               required
            >
        </div>

        <div class="fotgot-password">
            <a href="#">Consultar codigo de empleados</a>
        </div>

        <button type="submit" class="btn-login">
            Iniciar sesión
        </button>
    </form>
    </div>
</body>
</html>
